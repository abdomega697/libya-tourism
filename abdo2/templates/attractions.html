{% extends "base.html" %}
{% block content %}
<section class="page-header">
    <div class="container">
        <h1><i class="fas fa-camera"></i> أهم المعالم السياحية</h1>
        <p>اكتشف أجمل المعالم والأماكن في ليبيا</p>
    </div>
</section>

<section class="attractions-gallery">
    <div class="container">
        <div class="gallery-grid">
            {% for region in regions %}
            <div class="gallery-item">
                <img src="{{ url_for('static', filename='images/' + region.image) }}" alt="{{ region.name }}" onerror="this.src='https://placehold.co/600x400/1a1a2e/f9a826?text={{ region.name }}'">
                <div class="gallery-caption">
                    <h3>{{ region.name }}</h3>
                    <p>{{ region.description[:80] }}...</p>
                    <a href="/region/{{ region.id }}" class="btn-small">اقرأ المزيد</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
